<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Editor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/3bf06a41ed.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>Unit 3</h1>
        <hr class="separator">
        <input type="text" placeholder="Untiteld">
        <hr class="separator">
        <i class="icon fa-solid fa-upload"></i>
        <i class="icon fa-solid fa-download"></i>
        <i class="icon fa-solid fa-image"></i>
        <hr class="separator">
        <div class="right-icons">
            <i class="icon fa-solid fa-gear"></i>
            <i class="icon fa-solid fa-plus"></i>
        </div>
    </header>
    <section>
        <article class="tool-box">
            <i class="icon fa-solid fa-play"></i>
            <i class="icon fa-solid fa-forward-step"></i>
            <hr class="separator">
            <i class="icon fa-solid fa-pen"></i>
            <i class="icon fa-solid fa-hand-pointer"></i>
            <i class="icon fa-solid fa-arrow-pointer"></i>
        </article>
        <article class="cell-types">
            <div class="cell-type ct-eraser">
                <i class="icon fa-solid fa-eraser"></i>
            </div>
            <div class="cell-type ct-cable"></div>
            <div class="cell-type ct-inverter"></div>
            <div class="cell-type ct-delay"></div>
        </article>
    </section>
    <canvas></canvas>
    <script src="script.js"></script>
</body>
</html>
