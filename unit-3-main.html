<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Grid Sim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07070f;
  --surf:#0d0d18;
  --surf2:#111120;
  --bd:rgba(255,255,255,.055);
  --bdhi:rgba(255,255,255,.13);
  --tx:#b0b0c8;
  --txd:#323248;
  --txhi:#efefff;
  --acc:#4f5eff;
  --cable:#00d878;
  --inv:#ff6a20;
  --delay:#9955ff;
  --r:5px;
  --mono:'DM Mono',monospace;
  --head:'Syne',sans-serif;
}

body{
  background:var(--bg);color:var(--tx);font-family:var(--mono);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;
}

/* ══ TOOLBAR ══ */
.tb{
  display:flex;align-items:center;gap:1px;padding:0 8px;height:42px;
  background:var(--surf);border-bottom:1px solid var(--bd);flex-shrink:0;
}

.logo{
  font-family:var(--head);font-size:14px;font-weight:800;letter-spacing:.04em;
  color:var(--txhi);padding-right:12px;margin-right:6px;
  border-right:1px solid var(--bd);white-space:nowrap;flex-shrink:0;
}
.logo b{color:var(--acc)}

/* type selector pills — the hero element */
.type-selector{
  display:flex;align-items:center;gap:2px;
  background:var(--bg);border:1px solid var(--bd);
  border-radius:7px;padding:2px;margin:0 6px;flex-shrink:0;
}
.type-pill{
  display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:500;letter-spacing:.05em;
  padding:5px 11px;border-radius:5px;cursor:pointer;
  color:var(--txd);background:transparent;border:none;font-family:var(--mono);
  transition:color .15s,background .15s;white-space:nowrap;
}
.type-pill:hover{color:var(--tx)}
.type-pill.active{
  color:var(--txhi);
  background:var(--surf2);
  box-shadow:0 0 0 1px var(--bdhi);
}
.type-pill.active[data-t="1"]{color:var(--cable);box-shadow:0 0 0 1px rgba(0,216,120,.25)}
.type-pill.active[data-t="2"]{color:var(--inv);box-shadow:0 0 0 1px rgba(255,106,32,.25)}
.type-pill.active[data-t="3"]{color:var(--delay);box-shadow:0 0 0 1px rgba(153,85,255,.25)}
.type-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.sep{width:1px;height:20px;background:var(--bd);margin:0 4px;flex-shrink:0}

.btn{
  font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.05em;
  text-transform:uppercase;color:var(--txd);background:transparent;
  border:1px solid transparent;border-radius:var(--r);padding:5px 10px;
  cursor:pointer;transition:color .12s,border-color .12s,background .12s;white-space:nowrap;
}
.btn:hover{color:var(--txhi);border-color:var(--bdhi);background:var(--surf2)}
.btn.run{color:var(--cable);border-color:rgba(0,216,120,.25);background:rgba(0,216,120,.06)}

.ibtn{
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border:1px solid transparent;border-radius:var(--r);color:var(--txd);
  cursor:pointer;transition:color .12s,border-color .12s,background .12s;background:transparent;
}
.ibtn:hover{color:var(--txhi);border-color:var(--bdhi);background:var(--surf2)}

.stats{margin-left:auto;display:flex;align-items:center;gap:16px;padding-right:2px}
.stat{display:flex;align-items:baseline;gap:4px}
.sl{font-size:9px;color:var(--txd);letter-spacing:.06em}
.sv{font-size:11px;color:var(--txhi)}

/* ══ MAIN ══ */
.main{flex:1;display:flex;overflow:hidden;position:relative}
canvas{flex:1;display:block}

/* ══ TYPE INDICATOR (near cursor) ══ */
#typeInd{
  position:fixed;pointer-events:none;z-index:100;
  display:flex;align-items:center;gap:6px;
  background:rgba(7,7,15,.88);border:1px solid var(--bdhi);
  border-radius:100px;padding:5px 12px 5px 9px;
  font-size:10px;font-weight:500;letter-spacing:.06em;
  backdrop-filter:blur(6px);
  opacity:0;transition:opacity .35s;
  transform:translate(18px,-50%);
  white-space:nowrap;
}
#typeInd.show{opacity:1;transition:opacity 0s}
#typeInd .ind-dot{width:8px;height:8px;border-radius:50%}

/* ══ RIGHT PANEL ══ */
.rpanel{
  width:186px;background:var(--surf);border-left:1px solid var(--bd);
  display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;
  scrollbar-width:thin;scrollbar-color:#1a1a28 transparent;
  position:fixed;right:0;top:0;bottom:0;z-index:50;
  padding-top:0;
}
/* push canvas area left of the fixed panel */
.main{margin-right:186px;}
.rpanel::-webkit-scrollbar{width:3px}
.rpanel::-webkit-scrollbar-thumb{background:#1a1a28;border-radius:2px}

.rps{padding:13px;border-bottom:1px solid var(--bd)}
.rpt{font-size:8px;font-weight:500;letter-spacing:.16em;color:var(--txd);
  text-transform:uppercase;margin-bottom:10px}

/* preset buttons */
.preset-btn{
  display:flex;align-items:center;gap:6px;width:100%;
  font-family:var(--mono);font-size:9.5px;color:var(--txd);
  background:transparent;border:1px solid transparent;
  border-radius:4px;padding:5px 7px;cursor:pointer;
  transition:color .12s,border-color .12s,background .12s;text-align:left;
}
.preset-btn:hover{color:var(--txhi);border-color:var(--bd);background:var(--surf2)}
.preset-btn.active{color:var(--txhi);border-color:var(--bdhi);background:var(--surf2)}

/* color rows */
.cbl{font-size:7.5px;letter-spacing:.1em;color:#22223a;text-transform:uppercase;margin:10px 0 5px}
.cbl:first-child{margin-top:0}
.cr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cs{width:24px;height:17px;border-radius:3px;flex-shrink:0;cursor:pointer;
  border:1px solid rgba(255,255,255,.07);transition:border-color .12s}
.cs:hover{border-color:rgba(255,255,255,.22)}
.crl{font-size:9px;color:var(--txd);letter-spacing:.04em}

/* grid size */
.srow{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--txd);margin-bottom:8px}
.sinp{
  width:46px;background:var(--bg);border:1px solid var(--bd);
  border-radius:4px;color:var(--tx);font-family:var(--mono);font-size:10px;
  padding:4px 6px;outline:none;transition:border-color .12s;
}
.sinp:focus{border-color:var(--acc)}
.rbtn{
  width:100%;font-family:var(--mono);font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--txd);background:var(--bg);
  border:1px solid var(--bd);border-radius:4px;padding:6px;
  cursor:pointer;transition:color .12s,border-color .12s;
}
.rbtn:hover{color:var(--txhi);border-color:var(--bdhi)}

/* ══ OVERLAYS ══ */
#errMsg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(50,5,5,.95);border:1px solid rgba(255,40,40,.35);color:#ff8080;
  font-size:11px;padding:10px 24px;display:none;pointer-events:none;
  letter-spacing:.1em;text-align:center;
}
#hint{
  position:absolute;bottom:8px;left:12px;font-size:9px;
  color:#18182a;pointer-events:none;line-height:2;letter-spacing:.04em;
}
#coords{
  position:absolute;bottom:8px;right:12px;font-size:9px;
  color:var(--txd);pointer-events:none;letter-spacing:.05em;
}

/* ══ MOBILE BOTTOM BAR ══ */
.mobile-bar{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(13,13,24,.95);border-top:1px solid var(--bd);
  padding:8px 12px 12px;gap:6px;flex-direction:row;align-items:center;
  backdrop-filter:blur(10px);z-index:50;
}
.mob-pill{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.04em;
  padding:10px 8px;border-radius:8px;cursor:pointer;
  border:1px solid var(--bd);background:var(--surf2);color:var(--txd);
  transition:all .12s;
}
.mob-pill.active{
  border-color:var(--bdhi);background:var(--surf);color:var(--txhi);
}
.mob-pill.active[data-t="1"]{color:var(--cable);border-color:rgba(0,216,120,.3);background:rgba(0,216,120,.07)}
.mob-pill.active[data-t="2"]{color:var(--inv);border-color:rgba(255,106,32,.3);background:rgba(255,106,32,.07)}
.mob-pill.active[data-t="3"]{color:var(--delay);border-color:rgba(153,85,255,.3);background:rgba(153,85,255,.07)}
.mob-erase{
  width:46px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:13px;padding:10px;border-radius:8px;
  cursor:pointer;border:1px solid var(--bd);background:var(--surf2);color:var(--txd);
  transition:all .12s;flex-shrink:0;
}
.mob-erase.active{color:#ff4444;border-color:rgba(255,60,60,.3);background:rgba(255,60,60,.07)}

@media(pointer:coarse){
  .mobile-bar{display:flex}
  .main{padding-bottom:60px}
  .btn{font-size:13px;padding:7px 14px}
  .ibtn{width:36px;height:36px}
  .tb{height:50px;gap:2px}
  .stats{gap:12px}
  #hint{display:none}
  /* hide type selector in toolbar on touch — use bottom bar instead */
  .type-selector{display:none}
}



/* ── Mobile bottom bar ── */



@media (pointer: coarse) {
  .rpanel{display:none;}
  .main{margin-right:0;}
  #hint { display: none; }
  header { padding: 8px 12px; gap: 8px; }
  .btn { font-size: 13px; padding: 7px 14px; }
}

/* ── Touch selection ── */
#lpRing {
  position: fixed;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 2px solid rgba(255,200,60,0.7);
  pointer-events: none;
  display: none;
  transform: translate(-50%,-50%) scale(0.3);
  transition: transform 0.35s cubic-bezier(.2,1.4,.4,1), opacity 0.35s;
  opacity: 0;
  z-index: 100;
}
#lpRing.grow {
  transform: translate(-50%,-50%) scale(1);
  opacity: 1;
}
#lpRing.fired {
  transform: translate(-50%,-50%) scale(1.4);
  opacity: 0;
  transition: transform 0.2s ease-out, opacity 0.2s ease-out;
}


.mob-sel-cancel {
  font-size: 15px;
  padding: 4px 8px;
  cursor: pointer;
  color: rgba(255,200,60,0.6);
}
.mob-act {
  font-family: monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  color: #666;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px;
  padding: 5px 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.12s, border-color 0.12s, background 0.12s;
}
.mob-act:hover, .mob-act:active { color: #ccc; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); }
</style>
</head>
<body>

<div class="tb">
  <div class="logo">GRD<b>·</b>SIM</div>

  <!-- Type selector (desktop) -->
  <div class="type-selector" id="typeSelector">
    <button class="type-pill active" data-t="1">
      <span class="type-dot" style="background:var(--cable)"></span>CABLE
    </button>
    <button class="type-pill" data-t="2">
      <span class="type-dot" style="background:var(--inv)"></span>INVERTER
    </button>
    <button class="type-pill" data-t="3">
      <span class="type-dot" style="background:var(--delay)"></span>DELAY
    </button>
  </div>

  <div class="sep"></div>

  <button class="btn" id="btnStep">STEP</button>
  <button class="btn" id="btnRun">RUN</button>
  <button class="btn" id="btnReset">RESET</button>

  <div class="sep"></div>

  <div class="ibtn" id="btnSave" title="Save">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M13 13H3a1 1 0 01-1-1V4l3-3h8a1 1 0 011 1v10a1 1 0 01-1 1z"/>
      <rect x="5" y="9" width="6" height="4"/><rect x="5" y="2" width="5" height="3"/>
    </svg>
  </div>
  <div class="ibtn" id="btnLoad" title="Load">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M2 4v8a1 1 0 001 1h10a1 1 0 001-1V6l-3-3H3a1 1 0 00-1 1z"/>
      <path d="M8 5v6M5 8l3 3 3-3"/>
    </svg>
  </div>
  <div class="ibtn" id="btnExportPng" title="Export PNG">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="2" width="12" height="12" rx="1"/>
      <path d="M5 10l2-2 2 2 3-4"/>
      <circle cx="5.5" cy="5.5" r="1" fill="currentColor" stroke="none"/>
    </svg>
  </div>
  <input type="file" id="fileIn" accept=".json" style="display:none">

  <div class="stats">
    <div class="stat"><span class="sl">NETS</span><span class="sv" id="sNets">0</span></div>
    <div class="stat"><span class="sl">STEP</span><span class="sv" id="sStep">0</span></div>
  </div>
</div>

<div class="main">
  <canvas id="c"></canvas>

  <!-- Right panel -->
  <div class="rpanel">
    <div class="rps">
      <div class="rpt">Presets</div>
      <div id="presetBtns" style="display:flex;flex-direction:column;gap:3px"></div>
    </div>
    <div class="rps">
      <div class="rpt">Colors</div>
      <div id="colorRows"></div>
    </div>
    <div class="rps">
      <div class="rpt">Grid Size</div>
      <div class="srow">W<input class="sinp" id="inW" type="number" min="10" max="500" value="150">
      H<input class="sinp" id="inH" type="number" min="10" max="300" value="100"></div>
      <button class="rbtn" id="btnResize">RESIZE</button>
    </div>
  </div>

  <div id="errMsg"></div>
  <div id="hint">
    L=place · R=erase · scroll=type · ctrl+scroll=zoom<br>
    space+drag=pan · shift+drag=select<br>
    paste: L=place · q/w=rot · e/r=flip · esc=cancel
  </div>
  <div id="coords"></div>
</div>

<!-- Mobile bottom bar -->
<div class="mobile-bar" id="mobileBar">
  <!-- Draw layer (shown normally) -->
  <div id="mobDrawLayer" style="display:flex;align-items:center;gap:4px">
    <div class="mob-pill active" data-t="1">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--cable);flex-shrink:0"></span>
      CABLE
    </div>
    <div class="mob-pill" data-t="2">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--inv);flex-shrink:0"></span>
      INV
    </div>
    <div class="mob-pill" data-t="3">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--delay);flex-shrink:0"></span>
      DELAY
    </div>
    <div class="mob-erase" id="mobErase">⌫</div>
  </div>
  <!-- Select layer (shown in touchSelMode) -->
  <div id="mobSelLayer" style="display:none;align-items:center;gap:4px">
    <span id="mobSelLabel" style="font-size:10px;color:rgba(255,200,60,.7);letter-spacing:.06em;padding:0 6px 0 2px;border-right:1px solid rgba(255,255,255,.08)">SELECT</span>
    <button class="mob-act" id="maCopy">COPY</button>
    <button class="mob-act" id="maCut">CUT</button>
    <button class="mob-act" id="maPaste">PASTE</button>
    <button class="mob-act" id="maRotCW">ROT↻</button>
    <button class="mob-act" id="maRotCCW">ROT↺</button>
    <button class="mob-act" id="maFlipH">↔</button>
    <button class="mob-act" id="maFlipV">↕</button>
    <button class="mob-act" id="maDel" style="color:#f44">⌫</button>
    <button class="mob-act" id="maExit" style="color:rgba(255,200,60,.5);margin-left:4px">✕</button>
  </div>
</div>
<div id="lpRing"></div>

<!-- Type indicator (near cursor) -->
<div id="typeInd"><span class="ind-dot" id="indDot"></span><span id="indLabel"></span></div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// CONSTANTS & DATA
// ══════════════════════════════════════════════════════════════════════════════
const T = { EMPTY:0, CABLE:1, INVERTER:2, DELAY:3 };
const isTouchDevice = navigator.maxTouchPoints > 0;
const TYPE_NAMES = ['EMPTY','CABLE','INVERTER','DELAY'];
const TYPE_COLORS_CSS = ['', 'var(--cable)', 'var(--inv)', 'var(--delay)'];

const DEF_COLORS = [
  ['#07070f','#07070f','#0f0f1c','#0f0f1c'],
  ['#112238','#0a3020','#1e3d5c','#00d878'],
  ['#2c1408','#401808','#5c2a10','#ff6a20'],
  ['#16082e','#220a40','#32165c','#9955ff'],
];
let colors = DEF_COLORS.map(r=>[...r]);

const PALETTES = {
  'Default':[
    ['#07070f','#07070f','#0f0f1c','#0f0f1c'],
    ['#112238','#0a3020','#1e3d5c','#00d878'],
    ['#2c1408','#401808','#5c2a10','#ff6a20'],
    ['#16082e','#220a40','#32165c','#9955ff'],
  ],
  'Retro Futuristic':[
    ['#0a0a12','#0a0a12','#151520','#151520'],
    ['#0d2b1a','#0d4a2a','#1a5c38','#00ff88'],
    ['#2b0d1a','#4a0d2a','#7a1040','#ff0066'],
    ['#1a0d2b','#2e0d4a','#5010aa','#aa44ff'],
  ],
  'Amber Terminal':[
    ['#0a0800','#0a0800','#140f00','#140f00'],
    ['#1a1200','#2e1f00','#4a3200','#ff9900'],
    ['#1a0a00','#2e1200','#5a2000','#ff5500'],
    ['#100d00','#221900','#3a2e00','#ffcc00'],
  ],
  'Synthwave':[
    ['#0d0015','#0d0015','#1a0028','#1a0028'],
    ['#0d0030','#150050','#2200aa','#6600ff'],
    ['#300010','#500020','#aa0055','#ff00aa'],
    ['#001530','#002050','#0044aa','#00aaff'],
  ],
  'Industrial':[
    ['#0c0c0a','#0c0c0a','#1a1a14','#1a1a14'],
    ['#1a1a0a','#2a2a10','#4a4a18','#d4c84a'],
    ['#1a0a0a','#2a1010','#5a2020','#cc4422'],
    ['#0a0a1a','#10101e','#282840','#4466cc'],
  ],
  'Biohazard':[
    ['#050a05','#050a05','#0a140a','#0a140a'],
    ['#0a1f0a','#0f2e0f','#1a5a1a','#33ff33'],
    ['#1a1f00','#2a3200','#556600','#aaee00'],
    ['#001a0a','#002a14','#005522','#00ff88'],
  ],
  'Ice':[
    ['#08080f','#08080f','#10101a','#10101a'],
    ['#0a1520','#102030','#1a4060','#44aadd'],
    ['#0a1a22','#102530','#1a5566','#44ddcc'],
    ['#080f1a','#10182a','#1a3066','#4466ff'],
  ],
  'Schlich':[
    ['#0f0f0f','#0f0f0f','#1a1a1a','#1a1a1a'],
    ['#1a1a1a','#2a2a2a','#333333','#cccccc'],
    ['#1a1a1a','#2a2a2a','#444444','#ffffff'],
    ['#1a1a1a','#2a2a2a','#555555','#888888'],
  ],
};

// ══════════════════════════════════════════════════════════════════════════════
// GRID
// ══════════════════════════════════════════════════════════════════════════════
let GW = 150, GH = 100;
function makeCells(w,h) {
  const g=[];
  for(let y=0;y<h;y++){g.push([]);for(let x=0;x<w;x++)g[y].push({type:0,state:false});}
  return g;
}
let cells = makeCells(GW,GH);

// ══════════════════════════════════════════════════════════════════════════════
// SIMULATION
// ══════════════════════════════════════════════════════════════════════════════
let netState={}, netEdges=[], cellNet=[];
let netDirty=true, stepCount=0;
let running=false, runTimer=null;

function makeCellNet(w,h){
  const g=[];
  for(let y=0;y<h;y++){g.push([]);for(let x=0;x<w;x++)g[y].push(-1);}
  return g;
}
cellNet=makeCellNet(GW,GH);

function makeUF(n){
  const p=Array.from({length:n},(_,i)=>i), r=new Int32Array(n);
  function find(x){while(p[x]!==x){p[x]=p[p[x]];x=p[x];}return x;}
  function union(a,b){a=find(a);b=find(b);if(a===b)return;if(r[a]<r[b])[a,b]=[b,a];p[b]=a;if(r[a]===r[b])r[a]++;}
  return{find,union};
}

function compile(){
  cellNet=makeCellNet(GW,GH);
  const uf=makeUF(GW*GH);
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    if(cells[y][x].type===T.EMPTY)continue;
    const i=y*GW+x;
    if(x+1<GW&&cells[y][x+1].type!==T.EMPTY)uf.union(i,y*GW+x+1);
    if(y+1<GH&&cells[y+1][x].type!==T.EMPTY)uf.union(i,(y+1)*GW+x);
  }
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    if(cells[y][x].type!==T.EMPTY)continue;
    if(x>0&&x+1<GW&&cells[y][x-1].type===T.INVERTER&&cells[y][x+1].type===T.INVERTER)
      uf.union(y*GW+x-1,y*GW+x+1);
    if(y>0&&y+1<GH&&cells[y-1][x].type===T.INVERTER&&cells[y+1][x].type===T.INVERTER)
      uf.union((y-1)*GW+x,(y+1)*GW+x);
  }
  const rootToId=new Map();let nextId=0;
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    if(cells[y][x].type===T.EMPTY)continue;
    const root=uf.find(y*GW+x);
    if(!rootToId.has(root))rootToId.set(root,nextId++);
    cellNet[y][x]=rootToId.get(root);
  }
  const ns={};
  for(let i=0;i<nextId;i++)ns[i]=false;
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    const id=cellNet[y][x];
    if(id>=0&&cells[y][x].state)ns[id]=true;
  }
  netState=ns;
  const seen=new Set();netEdges=[];
  function tryEdge(src,dst,type){const k=`${src}-${dst}-${type}`;if(!seen.has(k)){seen.add(k);netEdges.push({src,dst,type});}}
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    if(cells[y][x].type!==T.EMPTY)continue;
    for(const[dx,dy]of[[1,0],[0,1]]){
      const ax=x-dx,ay=y-dy,bx=x+dx,by=y+dy;
      if(ax<0||ay<0||bx>=GW||by>=GH)continue;
      const ca=cells[ay][ax],cb=cells[by][bx];
      if(ca.type===T.EMPTY||cb.type===T.EMPTY)continue;
      const na=cellNet[ay][ax],nb=cellNet[by][bx];
      if(na===nb||na<0||nb<0)continue;
      if(ca.type===T.INVERTER&&cb.type===T.CABLE)tryEdge(na,nb,'INVERT');
      if(ca.type===T.CABLE&&cb.type===T.INVERTER)tryEdge(nb,na,'INVERT');
      if(ca.type===T.DELAY&&cb.type===T.CABLE)tryEdge(na,nb,'DELAY');
      if(ca.type===T.CABLE&&cb.type===T.DELAY)tryEdge(nb,na,'DELAY');
      if(ca.type===T.DELAY&&cb.type===T.INVERTER)tryEdge(na,nb,'BUFFER');
      if(ca.type===T.INVERTER&&cb.type===T.DELAY)tryEdge(nb,na,'BUFFER');
    }
  }
  netDirty=false;updateStats();
}

function stepSim(){
  if(netDirty)compile();
  const ids=Object.keys(netState).map(Number);
  if(!ids.length)return false;
  const prev={...netState},next={...netState};
  const inc={};ids.forEach(id=>inc[id]=[]);
  netEdges.forEach(e=>inc[e.dst].push(e));
  const maxIter=ids.length+1;let converged=false;
  for(let iter=0;iter<maxIter;iter++){
    let ch=false;
    for(const id of ids){
      const ins=inc[id];let r=false;
      if(ins.length)for(const e of ins){
        if(e.type==='INVERT')r=r||!next[e.src];
        else if(e.type==='BUFFER')r=r||next[e.src];
        else if(e.type==='DELAY')r=r||prev[e.src];
      }
      if(next[id]!==r){next[id]=r;ch=true;}
    }
    if(!ch){converged=true;break;}
  }
  if(!converged){stopRun();showErr('UNSTABLE LOOP');return false;}
  let anyChanged=false;
  for(const id of ids){if(netState[id]!==next[id])anyChanged=true;netState[id]=next[id];}
  syncBack();stepCount++;updateStats();draw();return anyChanged;
}

function syncBack(){
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    const id=cellNet[y][x];
    if(id>=0)cells[y][x].state=netState[id]||false;
  }
}
function showErr(msg){
  const el=document.getElementById('errMsg');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',2000);
}
function updateStats(){
  document.getElementById('sNets').textContent=Object.keys(netState).length;
  document.getElementById('sStep').textContent=stepCount;
}

// ══════════════════════════════════════════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let camX=0,camY=0,camZ=12;

function resize(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;draw();}
window.addEventListener('resize',resize);

function cellToScreen(x,y){return[x*camZ+camX,y*camZ+camY];}
function screenToCell(sx,sy){return[Math.floor((sx-camX)/camZ),Math.floor((sy-camY)/camZ)];}
function inBounds(x,y){return x>=0&&y>=0&&x<GW&&y<GH;}

function draw(){
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='#05050e';ctx.fillRect(0,0,W,H);

  // Grid area background + border
  const gx = Math.floor(0*camZ+camX), gy = Math.floor(0*camZ+camY);
  const gw = Math.floor(GW*camZ), gh = Math.floor(GH*camZ);
  ctx.fillStyle = '#0e0e20';
  ctx.fillRect(gx, gy, gw, gh);
  ctx.strokeStyle = 'rgba(60,90,220,0.55)';
  ctx.lineWidth = 2;
  ctx.strokeRect(gx+1, gy+1, gw-2, gh-2);

  const x0=Math.max(0,Math.floor(-camX/camZ));
  const y0=Math.max(0,Math.floor(-camY/camZ));
  const x1=Math.min(GW,Math.ceil((W-camX)/camZ)+1);
  const y1=Math.min(GH,Math.ceil((H-camY)/camZ)+1);
  const sz=camZ;

  for (let y=y0;y<y1;y++) for (let x=x0;x<x1;x++) {
    const c=cells[y][x];
    if (c.type===T.EMPTY) continue;
    const col=colors[c.type];
    const px=Math.floor(x*camZ+camX), py=Math.floor(y*camZ+camY);
    ctx.fillStyle = c.state ? col[1] : col[0];
    ctx.fillRect(px, py, sz, sz);
  }
  for (let y=y0;y<y1;y++) for (let x=x0;x<x1;x++) {
    const c=cells[y][x];
    if (c.type===T.EMPTY) continue;
    const col=colors[c.type];
    const px=Math.floor(x*camZ+camX), py=Math.floor(y*camZ+camY);
    const nT=inBounds(x,y-1)&&cells[y-1][x].type!==T.EMPTY;
    const nB=inBounds(x,y+1)&&cells[y+1][x].type!==T.EMPTY;
    const nL=inBounds(x-1,y)&&cells[y][x-1].type!==T.EMPTY;
    const nR=inBounds(x+1,y)&&cells[y][x+1].type!==T.EMPTY;
    ctx.strokeStyle = c.state ? col[3] : col[2];
    ctx.lineWidth   = c.state ? 1.5 : 0.8;
    ctx.beginPath();
    if (!nT) { ctx.moveTo(px,      py+.5);    ctx.lineTo(px+sz,  py+.5); }
    if (!nB) { ctx.moveTo(px,      py+sz-.5); ctx.lineTo(px+sz,  py+sz-.5); }
    if (!nL) { ctx.moveTo(px+.5,   py);       ctx.lineTo(px+.5,  py+sz); }
    if (!nR) { ctx.moveTo(px+sz-.5,py);       ctx.lineTo(px+sz-.5,py+sz); }
    ctx.stroke();
  }

  // Selection
  if(selRect){
    const{x1:sx1,y1:sy1,x2:sx2,y2:sy2}=normRect(selRect);
    const[px1,py1]=cellToScreen(sx1,sy1);
    const[px2,py2]=cellToScreen(sx2+1,sy2+1);
    ctx.strokeStyle='rgba(255,200,60,.8)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.strokeRect(px1,py1,px2-px1,py2-py1);
    ctx.fillStyle='rgba(255,200,60,.04)';
    ctx.fillRect(px1,py1,px2-px1,py2-py1);
    ctx.setLineDash([]);
  }

  // Paste preview
  if(pasteMode&&clipboard&&mouseCell){
    ctx.globalAlpha=0.5;
    for(let dy=0;dy<clipboard.length;dy++)for(let dx=0;dx<clipboard[dy].length;dx++){
      const t=clipboard[dy][dx];if(t===T.EMPTY)continue;
      const px2=Math.floor((mouseCell[0]+dx)*camZ+camX),py2=Math.floor((mouseCell[1]+dy)*camZ+camY);
      ctx.fillStyle=colors[t][0];ctx.fillRect(px2,py2,sz,sz);
      ctx.strokeStyle=colors[t][2];ctx.lineWidth=1;ctx.strokeRect(px2+.5,py2+.5,sz-1,sz-1);
    }
    ctx.globalAlpha=1;
  }

  // Grid lines
  if(camZ>=8){
    ctx.strokeStyle='rgba(255,255,255,.02)';ctx.lineWidth=0.5;
    for(let x=x0;x<=x1;x++){const px=x*camZ+camX;ctx.beginPath();ctx.moveTo(px,y0*camZ+camY);ctx.lineTo(px,y1*camZ+camY);ctx.stroke();}
    for(let y=y0;y<=y1;y++){const py=y*camZ+camY;ctx.beginPath();ctx.moveTo(x0*camZ+camX,py);ctx.lineTo(x1*camZ+camX,py);ctx.stroke();}
  }
}

let indTimer=null;
const indEl=document.getElementById('typeInd');
const indDot=document.getElementById('indDot');

function showTypeIndicator(mouseX,mouseY){

// ══════════════════════════════════════════════════════════════════════════════
// INPUT STATE
// ══════════════════════════════════════════════════════════════════════════════
let activeTool=T.CABLE;  // starts on CABLE
let drawing=false,drawType=0,lastDrawX=0,lastDrawY=0;
let panning=false,panSX=0,panSY=0,panOX=0,panOY=0;
let spacePanning=false;  // space+drag pan
let selDragging=false,selStart=null;
let selRect=null,clipboard=null,pasteMode=false,mouseCell=null;

function normRect(r){
  return{x1:Math.min(r.x1,r.x2),y1:Math.min(r.y1,r.y2),
         x2:Math.max(r.x1,r.x2),y2:Math.max(r.y1,r.y2)};
}

function setActiveTool(t){
  activeTool=t;
  // Update desktop type pills
  document.querySelectorAll('.type-pill').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.t)===t));
  // Update mobile bottom bar
  document.querySelectorAll('.mob-pill').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.t)===t));
  document.getElementById('mobErase').classList.remove('active');
}

function setErase(){
  activeTool=T.EMPTY;
  document.querySelectorAll('.type-pill').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mob-pill').forEach(b=>b.classList.remove('active'));
  document.getElementById('mobErase').classList.add('active');
}

// Type cycle: CABLE→INVERTER→DELAY→CABLE
function cycleType(dir){
  const order=[T.CABLE,T.INVERTER,T.DELAY];
  const cur=order.indexOf(activeTool);
  const next=order[(cur+(dir>0?1:2))%3]; // +1 forward, +2 = -1 backward
  setActiveTool(next);
}

function setCell(x,y,type){
  if(!inBounds(x,y))return;
  if(cells[y][x].type===type)return;
  cells[y][x].type=type;cells[y][x].state=false;netDirty=true;
}

function paintLine(x0,y0,x1,y1,type){
  const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  const sx=x0<x1?1:-1,sy=y0<y1?1:-1;
  let err=dx-dy,x=x0,y=y0;
  while(true){
    setCell(x,y,type);
    if(x===x1&&y===y1)break;
    const e2=2*err;
    if(e2>-dy){err-=dy;x+=sx;}
    if(e2<dx){err+=dx;y+=sy;}
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// MOUSE
// ══════════════════════════════════════════════════════════════════════════════
let spaceDown=false;

canvas.addEventListener('mousedown',e=>{
  e.preventDefault();
  const[cx,cy]=screenToCell(e.offsetX,e.offsetY);

  if(e.button===1||(e.button===0&&spaceDown)){
    panning=true;panSX=e.offsetX;panSY=e.offsetY;panOX=camX;panOY=camY;
    canvas.style.cursor='grabbing';return;
  }

  if(pasteMode){
    if(e.button===0)commitPaste(cx,cy);
    else{pasteMode=false;draw();}
    return;
  }

  if(e.button===0&&e.shiftKey){
    selDragging=true;selStart={x:cx,y:cy};
    selRect={x1:cx,y1:cy,x2:cx,y2:cy};draw();return;
  }

  if(e.button===0||e.button===2){
    if(selRect){selRect=null;draw();}
    drawing=true;
    drawType=e.button===2?T.EMPTY:activeTool;
    paintLine(cx,cy,cx,cy,drawType);
    lastDrawX=cx;lastDrawY=cy;compile();draw();
  }
});

canvas.addEventListener('mousemove',e=>{
  const[cx,cy]=screenToCell(e.offsetX,e.offsetY);
  mouseCell=[cx,cy];
  document.getElementById('coords').textContent=inBounds(cx,cy)?`${cx},${cy}`:'';

  if(panning){camX=panOX+(e.offsetX-panSX);camY=panOY+(e.offsetY-panSY);draw();return;}
  if(selDragging){selRect={x1:selStart.x,y1:selStart.y,x2:cx,y2:cy};draw();return;}
  if(drawing){paintLine(lastDrawX,lastDrawY,cx,cy,drawType);lastDrawX=cx;lastDrawY=cy;if(netDirty)compile();}
  draw();
});

canvas.addEventListener('mouseup',e=>{
  if(e.button===1||(e.button===0&&panning)){panning=false;canvas.style.cursor='crosshair';}
  if(e.button===0||e.button===2)drawing=false;
  if(selDragging&&e.button===0){
    selDragging=false;
    if(selRect){const r=normRect(selRect);if(r.x1===r.x2&&r.y1===r.y2){selRect=null;}}
    draw();
  }
});

canvas.addEventListener('contextmenu',e=>e.preventDefault());

// SCROLL: type switch OR zoom
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey||e.metaKey){
    // Zoom
    const f=e.deltaY<0?1.15:1/1.15;
    const nz=Math.min(80,Math.max(3,camZ*f));
    camX=e.offsetX-(e.offsetX-camX)*(nz/camZ);
    camY=e.offsetY-(e.offsetY-camY)*(nz/camZ);
    camZ=nz;draw();
  } else {
    // Type switch
    const dir=e.deltaY<0?1:-1;
    if(activeTool!==T.EMPTY){
      cycleType(dir);
    } else {
      setActiveTool(T.CABLE);
    }
    showTypeIndicator(e.clientX, e.clientY);
    draw();
  }
},{passive:false});

// Space = pan modifier
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key===' '){e.preventDefault();spaceDown=true;if(!drawing)canvas.style.cursor='grab';}
});
document.addEventListener('keyup',e=>{
  if(e.key===' '){spaceDown=false;if(!panning)canvas.style.cursor='crosshair';}
});

// ══════════════════════════════════════════════════════════════════════════════
// SELECTION HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function getSelCells(){
  if(!selRect)return null;
  const{x1,y1,x2,y2}=normRect(selRect);const data=[];
  for(let y=y1;y<=y2;y++){const row=[];for(let x=x1;x<=x2;x++)row.push(inBounds(x,y)?cells[y][x].type:T.EMPTY);data.push(row);}
  return data;
}
function setSelCells(data){
  if(!selRect)return;
  const r=normRect(selRect);
  for(let y=r.y1;y<=r.y2;y++)for(let x=r.x1;x<=r.x2;x++)
    if(inBounds(x,y)){cells[y][x].type=T.EMPTY;cells[y][x].state=false;}
  const{x1,y1}=r;
  for(let dy=0;dy<data.length;dy++)for(let dx=0;dx<data[dy].length;dx++)
    if(inBounds(x1+dx,y1+dy)){cells[y1+dy][x1+dx].type=data[dy][dx];cells[y1+dy][x1+dx].state=false;}
  selRect={x1,y1,x2:x1+data[0].length-1,y2:y1+data.length-1};
  netDirty=true;compile();draw();
}
function deleteSelection(){
  if(!selRect)return;
  const{x1,y1,x2,y2}=normRect(selRect);
  for(let y=y1;y<=y2;y++)for(let x=x1;x<=x2;x++)
    if(inBounds(x,y)){cells[y][x].type=T.EMPTY;cells[y][x].state=false;}
  netDirty=true;compile();selRect=null;draw();
}
function rotate90CW(data){const h=data.length,w=data[0].length;const out=Array.from({length:w},()=>Array(h).fill(0));for(let y=0;y<h;y++)for(let x=0;x<w;x++)out[x][h-1-y]=data[y][x];return out;}
function rotate90CCW(data){const h=data.length,w=data[0].length;const out=Array.from({length:w},()=>Array(h).fill(0));for(let y=0;y<h;y++)for(let x=0;x<w;x++)out[w-1-x][y]=data[y][x];return out;}
function flipH(data){return data.map(row=>[...row].reverse());}
function flipV(data){return[...data].reverse();}
function commitPaste(ox,oy){
  if(!clipboard)return;
  for(let dy=0;dy<clipboard.length;dy++)for(let dx=0;dx<clipboard[dy].length;dx++){
    const t=clipboard[dy][dx];
    if(inBounds(ox+dx,oy+dy)){cells[oy+dy][ox+dx].type=t;cells[oy+dy][ox+dx].state=false;}
  }
  pasteMode=false;netDirty=true;compile();draw();
}

// ══════════════════════════════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key===' ')return; // handled above

  if(pasteMode){
    if(e.key==='q'){clipboard=rotate90CCW(clipboard);draw();return;}
    if(e.key==='w'){clipboard=rotate90CW(clipboard);draw();return;}
    if(e.key==='e'){clipboard=flipH(clipboard);draw();return;}
    if(e.key==='r'){clipboard=flipV(clipboard);draw();return;}
    if(e.key==='Escape'){pasteMode=false;draw();return;}
  }

  if(selRect&&!pasteMode){
    if(e.key==='q'){const d=getSelCells();if(d)setSelCells(rotate90CCW(d));return;}
    if(e.key==='w'){const d=getSelCells();if(d)setSelCells(rotate90CW(d));return;}
    if(e.key==='e'){const d=getSelCells();if(d)setSelCells(flipH(d));return;}
    if(e.key==='r'){const d=getSelCells();if(d)setSelCells(flipV(d));return;}
    if(e.key==='Delete'||e.key==='Backspace'){deleteSelection();return;}
    if(e.ctrlKey&&(e.key==='c'||e.key==='C')){clipboard=getSelCells();return;}
    if(e.ctrlKey&&(e.key==='x'||e.key==='X')){clipboard=getSelCells();deleteSelection();return;}
  }
  if(e.ctrlKey&&(e.key==='v'||e.key==='V')){
    if(clipboard){pasteMode=true;selRect=null;draw();}return;
  }

  // Type shortcuts
  if(e.key==='1'){setActiveTool(T.CABLE);return;}
  if(e.key==='2'){setActiveTool(T.INVERTER);return;}
  if(e.key==='3'){setActiveTool(T.DELAY);return;}
  if(e.key==='0'||e.key==='Backquote'){setErase();return;}

  // Sim
  if(!e.ctrlKey&&(e.key==='s'||e.key==='S')){stopRun();stepSim();return;}
  if(!e.ctrlKey&&!e.shiftKey&&(e.key==='r'||e.key==='R')){document.getElementById('btnReset').click();return;}
  if(e.key==='Escape'){pasteMode=false;selRect=null;draw();return;}
});

// Refresh palette-dependent UI colors (dots in pills, etc.)
function refreshPaletteUI() {
  document.querySelectorAll('.mob-pill[data-t]').forEach(pill => {
    const t = parseInt(pill.dataset.t);
    const dot = pill.querySelector('span');
    if (dot && colors[t]) dot.style.background = colors[t][3];
  });
  document.querySelectorAll('.type-pill[data-t]').forEach(pill => {
    const t = parseInt(pill.dataset.t);
    const dot = pill.querySelector('.pill-dot');
    if (dot && colors[t]) dot.style.background = colors[t][3];
  });
  // Update indicator dot if visible
  if (indDot && activeTool !== T.EMPTY) indDot.style.background = colors[activeTool][3];
}

function buildColorUI(){
  const container=document.getElementById('colorRows');
  if(!container)return;
  container.innerHTML='';
  const labels=['bg-off','bg-on','border-off','border-on'];
  for(let t=0;t<4;t++){
    const hdr=document.createElement('div');

// ══════════════════════════════════════════════════════════════════════════════
// TOUCH
// ══════════════════════════════════════════════════════════════════════════════
let lastTapTime=0, lastTapX=0, lastTapY=0;
let tf1=false, tf1StartSX=0, tf1StartSY=0, tf1Moved=false;
let tf1DrawType=0, tf1LastCX=0, tf1LastCY=0;
let tf2=false, tf2PrevMX=0, tf2PrevMY=0, tf2PrevDist=0;

// Long press / select mode
let lpTimer=null, lpClientX=0, lpClientY=0;
let touchSelMode=false;   // finger-drag = selection rect
let touchSelDragging=false, touchSelStart=null;

const lpRing = document.getElementById('lpRing');

function enterTouchSel() {
  touchSelMode = true;
  selRect = null;
  const dl = document.getElementById('mobDrawLayer');
  const sl = document.getElementById('mobSelLayer');
  if (dl) dl.style.display = 'none';
  if (sl) sl.style.display = 'flex';
  if (navigator.vibrate) navigator.vibrate(30);
}
function exitTouchSel() {
  touchSelMode = false;
  selRect = null;
  touchSelDragging = false;
  const dl = document.getElementById('mobDrawLayer');
  const sl = document.getElementById('mobSelLayer');
  if (dl) dl.style.display = 'flex';
  if (sl) sl.style.display = 'none';
  draw();
}
function updateSelLabel() {
  const el = document.getElementById('mobSelLabel');
  if (!el || !selRect) return;
  const r = normRect(selRect);
  el.textContent = `${r.x2-r.x1+1}×${r.y2-r.y1+1}`;
}

function txy(touch) {
  const r = canvas.getBoundingClientRect();
  return [touch.clientX - r.left, touch.clientY - r.top];
}

function startLongPress(clientX, clientY) {
  lpClientX = clientX; lpClientY = clientY;
  if (lpRing) {
    lpRing.style.left = clientX + 'px';
    lpRing.style.top  = clientY + 'px';
    lpRing.style.display = 'block';
    lpRing.className = '';
    requestAnimationFrame(() => lpRing.classList.add('grow'));
  }
  lpTimer = setTimeout(() => {
    if (lpRing) {
      lpRing.classList.remove('grow');
      lpRing.classList.add('fired');
      setTimeout(() => { lpRing.style.display='none'; lpRing.className=''; }, 220);
    }
    enterTouchSel();
    draw();
  }, 380);
}

function cancelLongPress() {
  clearTimeout(lpTimer); lpTimer = null;
  if (lpRing) { lpRing.style.display='none'; lpRing.className=''; }
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();

  if (e.touches.length >= 2) {
    cancelLongPress();
    tf1 = false; touchSelDragging = false;
    const [ax,ay]=txy(e.touches[0]), [bx,by]=txy(e.touches[1]);
    tf2PrevMX=(ax+bx)/2; tf2PrevMY=(ay+by)/2;
    tf2PrevDist=Math.hypot(bx-ax,by-ay); tf2=true;
    return;
  }

  tf2 = false;
  const [sx,sy] = txy(e.touches[0]);
  const [cx,cy] = screenToCell(sx,sy);
  const now = Date.now();

  // Double-tap → cycle type (only in draw mode)
  if (!touchSelMode && now-lastTapTime<300 && Math.hypot(sx-lastTapX,sy-lastTapY)<40) {
    lastTapTime = 0;
    cycleType(1);
    draw(); return;
  }
  lastTapTime = now; lastTapX = sx; lastTapY = sy;

  if (pasteMode) {
    // Start paste drag — preview moves with finger, commit on touchend
    tf1=true; tf1StartSX=sx; tf1StartSY=sy; tf1Moved=false;
    mouseCell=[cx,cy]; draw(); return;
  }

  // In select mode: start selection drag
  if (touchSelMode) {
    touchSelDragging = true;
    touchSelStart = {x:cx, y:cy};
    selRect = {x1:cx,y1:cy,x2:cx,y2:cy};
    draw(); return;
  }

  // Draw mode: start long-press timer + prepare draw
  startLongPress(e.touches[0].clientX, e.touches[0].clientY);
  tf1 = true;
  tf1StartSX=sx; tf1StartSY=sy; tf1Moved=false;
  tf1DrawType = activeTool;
  tf1LastCX=cx; tf1LastCY=cy;
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();

  // 2-finger: pan + pinch zoom
  if (e.touches.length >= 2 && tf2) {
    const [ax,ay]=txy(e.touches[0]), [bx,by]=txy(e.touches[1]);
    const mx=(ax+bx)/2, my=(ay+by)/2, dist=Math.hypot(bx-ax,by-ay);
    camX+=mx-tf2PrevMX; camY+=my-tf2PrevMY;
    if (tf2PrevDist > 0) {
      const nz=Math.min(80,Math.max(3,camZ*(dist/tf2PrevDist)));
      camX=mx-(mx-camX)*(nz/camZ);
      camY=my-(my-camY)*(nz/camZ);
      camZ=nz;
    }
    tf2PrevMX=mx; tf2PrevMY=my; tf2PrevDist=dist;
    draw(); return;
  }

  if (e.touches.length !== 1) return;
  const [sx,sy] = txy(e.touches[0]);
  const [cx,cy] = screenToCell(sx,sy);
  mouseCell = [cx,cy];

  // Paste preview follows finger
  if (pasteMode) { draw(); return; }

  // Selection drag
  if (touchSelDragging) {
    selRect = {x1:touchSelStart.x,y1:touchSelStart.y,x2:cx,y2:cy};
    updateSelLabel();
    draw(); return;
  }

  // Cancel long press if finger moved much
  if (!tf1Moved && Math.hypot(sx-tf1StartSX,sy-tf1StartSY) > 8) {
    cancelLongPress();
    tf1Moved = true;
  }

  if (tf1 && tf1Moved) {
    paintLine(tf1LastCX, tf1LastCY, cx, cy, tf1DrawType);
    tf1LastCX=cx; tf1LastCY=cy;
    if (netDirty) compile();
    draw();
  }
}, {passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  cancelLongPress();
  if (e.touches.length < 2) tf2 = false;

  if (e.touches.length === 0) {
    if (touchSelDragging) {
      touchSelDragging = false;
      if (selRect) {
        const r = normRect(selRect);
        if (r.x1===r.x2 && r.y1===r.y2) { selRect=null; }
        else updateSelLabel();
      }
      draw(); return;
    }

    if (pasteMode && mouseCell) {
      commitPaste(mouseCell[0], mouseCell[1]);
      return;
    }

    if (tf1 && !tf1Moved && !pasteMode && !touchSelMode) {
      const [cx,cy] = screenToCell(tf1StartSX, tf1StartSY);
      setCell(cx, cy, tf1DrawType);
      if (netDirty) compile();
      draw();
    }
    tf1=false; tf1Moved=false;
  }
}, {passive:false});

wireMobAct('maDel',    () => { deleteSelection(); });
wireMobAct('maExit',   exitTouchSel);
