<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Sim — Dev</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #bbb; font-family: monospace; font-size: 12px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── toolbar ── */
#toolbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 6px 10px; background: #111; border-bottom: 1px solid #222; flex-shrink: 0; }
button { font-family: monospace; font-size: 11px; background: #1a1a2a; border: 1px solid #333; color: #888; padding: 4px 10px; cursor: pointer; }
button:hover { color: #ccc; border-color: #555; }
button.on { color: #0f8; border-color: #0f8; }
button.err { color: #f44; border-color: #f44; }
select, input[type=number] { font-family: monospace; font-size: 11px; background: #1a1a2a; border: 1px solid #333; color: #888; padding: 3px 6px; }
.sep { width: 1px; height: 18px; background: #333; }
label { color: #555; font-size: 10px; }

/* ── main split ── */
#main { flex: 1; display: flex; overflow: hidden; }

/* ── canvas ── */
#canvas-wrap { flex: 1; position: relative; overflow: hidden; }
canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
canvas.interact { cursor: pointer; }
.btn-interact-on { color: #ffaa20 !important; border-color: #ffaa20 !important; }

/* ── side panels ── */
#panel { width: 220px; background: #111; border-left: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.panel-section { padding: 8px 10px; border-bottom: 1px solid #1a1a2a; }
.panel-title { font-size: 9px; color: #444; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 6px; }

/* ── extension list ── */
.ext-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 11px; color: #666; }
.ext-row input[type=checkbox] { accent-color: #5c6bff; }

/* ── type palette ── */
#type-palette { display: flex; flex-wrap: wrap; gap: 4px; }
.type-btn { padding: 3px 8px; border: 1px solid #333; background: #1a1a2a; color: #666; cursor: pointer; font-family: monospace; font-size: 10px; }
.type-btn.active { color: #fff; }
.type-btn[data-active] { border-color: #5c6bff; color: #aaf; }

/* ── log ── */
#log { flex: 1; overflow-y: auto; padding: 6px 10px; font-size: 10px; line-height: 1.7; color: #444; }
.log-info  { color: #666; }
.log-ok    { color: #0a8; }
.log-warn  { color: #fa0; }
.log-error { color: #f44; }

/* ── status bar ── */
#status { padding: 3px 10px; background: #0d0d18; border-top: 1px solid #1a1a2a; font-size: 10px; color: #333; display: flex; gap: 16px; flex-shrink: 0; }
#status span b { color: #555; }
</style>
</head>
<body>

<div id="toolbar">
  <!-- Sim controls -->
  <button id="btn-step">STEP</button>
  <button id="btn-interact">INTERACT</button>
  <button id="btn-run">RUN</button>
  <button id="btn-reset">RESET</button>
  <div class="sep"></div>

  <!-- Active tool display -->
  <label>TOOL:</label>
  <span id="active-tool-label" style="color:#5c6bff;letter-spacing:.05em">CABLE</span>
  <div class="sep"></div>

  <!-- Grid size -->
  <label>W</label><input type="number" id="inp-w" value="60" min="5" max="300" style="width:50px">
  <label>H</label><input type="number" id="inp-h" value="40" min="5" max="200" style="width:50px">
  <button id="btn-resize">RESIZE</button>
  <div class="sep"></div>

  <!-- Save / Load -->
  <button id="btn-save">SAVE JSON</button>
  <button id="btn-load">LOAD JSON</button>
  <input type="file" id="file-in" accept=".json" style="display:none">
  <div class="sep"></div>

  <!-- Speed -->
  <label>MS/STEP</label>
  <input type="number" id="inp-speed" value="150" min="16" max="2000" style="width:55px">
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
  </div>

  <div id="panel">
    <!-- Extensions -->
    <div class="panel-section">
      <div class="panel-title">Extensions</div>
      <div id="ext-list"></div>
    </div>

    <!-- Type palette (updates when extensions change) -->
    <div class="panel-section">
      <div class="panel-title">Cell Type  <span style="color:#333">(scroll = cycle  ·  R = erase)</span></div>
      <div id="type-palette"></div>
    </div>

    <!-- Log -->
    <div class="panel-section" style="border-bottom:none;flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0">
      <div class="panel-title" style="padding:8px 10px 4px">Log</div>
      <div id="log"></div>
    </div>
  </div>
</div>

<div id="status">
  <span>NETS <b id="s-nets">0</b></span>
  <span>STEP <b id="s-step">0</b></span>
  <span>TOOL <b id="s-tool">CABLE</b></span>
  <span id="s-coords"></span>
  <span id="s-msg" style="color:#fa0"></span>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
