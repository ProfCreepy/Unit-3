<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D Gitter-Simulation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #f5f5f5;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      canvas {
        flex: 1;
        display: block;
        background: white;
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <canvas id="viewport"></canvas>

    <script>
      // ============================================================
      // GRUNDLEGENDE KONFIGURATION
      // ============================================================

      const canvas = document.getElementById("viewport");
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      // Canvas auf Fenster-Größe setzen
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      // ============================================================
      // VIEWPORT (Kamera-Einstellungen)
      // ============================================================

      const viewport = {
        offsetX: 0, // Verschiebung nach links/rechts
        offsetY: 0, // Verschiebung nach oben/unten
        scale: 1.0, // Zoom-Level (1.0 = normal)
      };

      // ============================================================
      // GRID-PARAMETER
      // ============================================================

      const grid = {
        cellSize: 50, // Größe eines Karo in Pixeln (bei scale=1.0)
      };

      // ============================================================
      // ZELLEN-DATEN
      // ============================================================

      const cells = new Map(); // key: "x,y" → value: true (gefüllt)

      function getCellKey(cellX, cellY) {
        return `${cellX},${cellY}`;
      }

      function isCellFilled(cellX, cellY) {
        return cells.has(getCellKey(cellX, cellY));
      }

      function setCellFilled(cellX, cellY, filled) {
        const key = getCellKey(cellX, cellY);
        if (filled) {
          cells.set(key, true);
        } else {
          cells.delete(key);
        }
      }

      function screenToWorld(screenX, screenY) {
        return {
          x: (screenX - viewport.offsetX) / viewport.scale,
          y: (screenY - viewport.offsetY) / viewport.scale,
        };
      }

      function worldToCell(worldX, worldY) {
        return {
          x: Math.floor(worldX / grid.cellSize),
          y: Math.floor(worldY / grid.cellSize),
        };
      }

      // ============================================================
      // MAUS-ZUSTAND
      // ============================================================

      const mouse = {
        isDown: false,
        button: null, // 0=links, 1=middle, 2=rechts
        mode: null, // 'pan', 'paint', 'delete'
        startX: 0, // Screen-Koordinaten
        startY: 0,
        lastCellX: null, // Zuletzt gemalte Zelle (für Drag-Modus)
        lastCellY: null,
        paintMode: null, // 'fill' oder 'erase' (für Links-Click Toggle)
      };

      // ============================================================
      // MAUS-EVENTS
      // ============================================================

      canvas.addEventListener("mousedown", (e) => {
        mouse.isDown = true;
        mouse.button = e.button;
        mouse.startX = e.clientX;
        mouse.startY = e.clientY;

        const rect = canvas.getBoundingClientRect();
        const screenX = e.clientX - rect.left;
        const screenY = e.clientY - rect.top;

        const world = screenToWorld(screenX, screenY);
        const cell = worldToCell(world.x, world.y);

        if (e.button === 1) {
          // === MAUSRAD-KLICK: Pan-Modus ===
          mouse.mode = "pan";
        } else if (e.button === 0) {
          // === LINKS-KLICK: Toggle Paint ===
          mouse.mode = "paint";

          // Bestimme Modus basierend auf erstem Zellklick
          const isFilled = isCellFilled(cell.x, cell.y);
          mouse.paintMode = isFilled ? "erase" : "fill";

          // Male erste Zelle
          setCellFilled(cell.x, cell.y, mouse.paintMode === "fill");
          mouse.lastCellX = cell.x;
          mouse.lastCellY = cell.y;
        } else if (e.button === 2) {
          // === RECHTS-KLICK: Delete ===
          mouse.mode = "delete";
          setCellFilled(cell.x, cell.y, false);
          mouse.lastCellX = cell.x;
          mouse.lastCellY = cell.y;
        }

        render();
      });

      canvas.addEventListener("mousemove", (e) => {
        if (!mouse.isDown) return;

        const rect = canvas.getBoundingClientRect();
        const screenX = e.clientX - rect.left;
        const screenY = e.clientY - rect.top;

        if (mouse.mode === "pan") {
          // === PAN: Viewport verschieben ===
          const deltaX = e.clientX - mouse.startX;
          const deltaY = e.clientY - mouse.startY;

          viewport.offsetX += deltaX;
          viewport.offsetY += deltaY;

          // ← WICHTIG: Runden auf Pixel-Grenzen
          viewport.offsetX = Math.round(viewport.offsetX);
          viewport.offsetY = Math.round(viewport.offsetY);

          mouse.startX = e.clientX;
          mouse.startY = e.clientY;
        } else if (mouse.mode === "paint" || mouse.mode === "delete") {
          // === PAINT/DELETE: Zellen malen während Drag ===
          const world = screenToWorld(screenX, screenY);
          const cell = worldToCell(world.x, world.y);

          // Nur malen wenn neue Zelle
          if (cell.x !== mouse.lastCellX || cell.y !== mouse.lastCellY) {
            if (mouse.mode === "paint") {
              setCellFilled(cell.x, cell.y, mouse.paintMode === "fill");
            } else if (mouse.mode === "delete") {
              setCellFilled(cell.x, cell.y, false);
            }

            mouse.lastCellX = cell.x;
            mouse.lastCellY = cell.y;
          }
        }

        render();
      });

      canvas.addEventListener("mouseup", (e) => {
        mouse.isDown = false;
        mouse.button = null;
        mouse.mode = null;
        mouse.paintMode = null;
        mouse.lastCellX = null;
        mouse.lastCellY = null;
      });

      // Rechtsklick-Menü verhindern
      canvas.addEventListener("contextmenu", (e) => {
        e.preventDefault();
      });

      // ============================================================
      // ZOOM-LOGIK (mit Mausrad)
      // ============================================================

      canvas.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();

          // Mausposition im Canvas
          const rect = canvas.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const mouseY = e.clientY - rect.top;

          // Alte Zoom-Stufe
          const oldScale = viewport.scale;

          // Neue Zoom-Stufe (nach oben = zoom in, nach unten = zoom out)
          const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
          viewport.scale *= zoomFactor;

          // Clamp zwischen min und max
          viewport.scale = Math.max(0.01, Math.min(viewport.scale, 2));

          // Kamera nachjustieren (Zoom um Cursor)
          const worldX = (mouseX - viewport.offsetX) / oldScale;
          const worldY = (mouseY - viewport.offsetY) / oldScale;

          viewport.offsetX = mouseX - worldX * viewport.scale;
          viewport.offsetY = mouseY - worldY * viewport.scale;

          // ← WICHTIG: Runden auf Pixel-Grenzen
          viewport.offsetX = Math.round(viewport.offsetX);
          viewport.offsetY = Math.round(viewport.offsetY);

          render();
        },
        { passive: false },
      );

      // ============================================================
      // RENDERING
      // ============================================================

      function render() {
        // Canvas leeren
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // === Transformation anwenden ===
        ctx.save();
        ctx.translate(viewport.offsetX, viewport.offsetY);
        ctx.scale(viewport.scale, viewport.scale);

        // === Raster zeichnen ===
        drawGrid();

        // === Zellen zeichnen ===
        drawCells();

        // === Zellen-Ränder zeichnen ===
        drawCellBorders();

        ctx.restore();

        // === UI-Info aktualisieren ===
        updateDisplay();
      }

      function drawGrid() {
        // Sichtbares Fenster in Welt-Koordinaten berechnen
        const minX = -viewport.offsetX / viewport.scale;
        const minY = -viewport.offsetY / viewport.scale;
        const maxX = minX + canvas.width / viewport.scale;
        const maxY = minY + canvas.height / viewport.scale;

        // ========== ADAPTIVES RASTER ==========
        const targetPixelSpacing = 50;
        const worldSpacing = targetPixelSpacing / viewport.scale;

        const spacingSteps = [50, 500, 5000, 50000];
        let spacing = 1;
        for (let step of spacingSteps) {
          if (step >= worldSpacing) {
            spacing = step;
            break;
          }
        }

        // Farbschema
        const minorColor = "#e8e8e8";
        const majorColor = "#cccccc";

        // ========== VERTIKALE LINIEN ==========
        const startCol = Math.floor(minX / spacing);
        const endCol = Math.ceil(maxX / spacing);

        for (let i = startCol; i <= endCol; i++) {
          const x = i * spacing;
          const isMajor = i % 10 === 0;

          ctx.strokeStyle = isMajor ? majorColor : minorColor;
          ctx.lineWidth = isMajor ? 2 / viewport.scale : 1 / viewport.scale;

          ctx.beginPath();
          ctx.moveTo(x, Math.floor(minY / spacing) * spacing);
          ctx.lineTo(x, Math.ceil(maxY / spacing) * spacing);
          ctx.stroke();
        }

        // ========== HORIZONTALE LINIEN ==========
        const startRow = Math.floor(minY / spacing);
        const endRow = Math.ceil(maxY / spacing);

        for (let i = startRow; i <= endRow; i++) {
          const y = i * spacing;
          const isMajor = i % 10 === 0;

          ctx.strokeStyle = isMajor ? majorColor : minorColor;
          ctx.lineWidth = isMajor ? 2 / viewport.scale : 1 / viewport.scale;

          ctx.beginPath();
          ctx.moveTo(Math.floor(minX / spacing) * spacing, y);
          ctx.lineTo(Math.ceil(maxX / spacing) * spacing, y);
          ctx.stroke();
        }

        // === Ursprung markieren (0,0) ===
        ctx.fillStyle = "#ff4444";
        ctx.beginPath();
        ctx.arc(0, 0, 3 / viewport.scale, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawCells() {
        const cellSize = grid.cellSize;

        // Sichtbares Fenster in Zell-Koordinaten
        const minX = -viewport.offsetX / viewport.scale;
        const minY = -viewport.offsetY / viewport.scale;
        const maxX = minX + canvas.width / viewport.scale;
        const maxY = minY + canvas.height / viewport.scale;

        const startCellX = Math.floor(minX / cellSize);
        const startCellY = Math.floor(minY / cellSize);
        const endCellX = Math.ceil(maxX / cellSize);
        const endCellY = Math.ceil(maxY / cellSize);

        // Nur gefüllte Zellen durchgehen (effizient!)
        for (let [key, _] of cells) {
          const [cellX, cellY] = key.split(",").map(Number);

          // Prüfe ob Zelle sichtbar ist
          if (
            cellX < startCellX ||
            cellX >= endCellX ||
            cellY < startCellY ||
            cellY >= endCellY
          ) {
            continue;
          }

          // Zeichne grünes Rechteck
          const x = Math.round(cellX * cellSize); // ← RUNDEN!
          const y = Math.round(cellY * cellSize);

          const size = Math.round(cellSize); // ← AUCH Größe runden!

          ctx.fillStyle = "#528e54";
          ctx.fillRect(x, y, size, size);
        }
      }

      function drawCellBorders() {
        const cellSize = grid.cellSize;
        const borderColor = "#386138"; // Sehr dunkel
        const borderWidth = 3 / viewport.scale; // Dicker als Grid-Linien

        // Nur gefüllte Zellen durchgehen
        for (let [key, _] of cells) {
          const [cellX, cellY] = key.split(",").map(Number);

          const x = Math.round(cellX * cellSize); // ← RUNDEN!
          const y = Math.round(cellY * cellSize);
          const size = Math.round(cellSize);

          // Prüfe die 4 Nachbarn
          const hasLeft = isCellFilled(cellX - 1, cellY);
          const hasRight = isCellFilled(cellX + 1, cellY);
          const hasTop = isCellFilled(cellX, cellY - 1);
          const hasBottom = isCellFilled(cellX, cellY + 1);

          ctx.strokeStyle = borderColor;
          ctx.lineWidth = borderWidth;

          // === Linke Kante (wenn Nachbar fehlt) ===
          if (!hasLeft) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + size);
            ctx.stroke();
          }

          // === Rechte Kante ===
          if (!hasRight) {
            ctx.beginPath();
            ctx.moveTo(x + size, y);
            ctx.lineTo(x + size, y + size);
            ctx.stroke();
          }

          // === Obere Kante ===
          if (!hasTop) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + size, y);
            ctx.stroke();
          }

          // === Untere Kante ===
          if (!hasBottom) {
            ctx.beginPath();
            ctx.moveTo(x, y + size);
            ctx.lineTo(x + size, y + size);
            ctx.stroke();
          }
        }
      }

      function updateDisplay() {
        // Spacing berechnen
        const targetPixelSpacing = 50;
        const worldSpacing = targetPixelSpacing / viewport.scale;

        const spacingSteps = [50, 1000, 5000, 50000];
        let spacing = 1;
        for (let step of spacingSteps) {
          if (step >= worldSpacing) {
            spacing = step;
            break;
          }
        }
        document.getElementById("zoom-display").textContent =
          viewport.scale.toFixed(2) + "×";
        document.getElementById("spacing-display").textContent = spacing;

        const centerWorldX = -viewport.offsetX / viewport.scale;
        const centerWorldY = -viewport.offsetY / viewport.scale;
        document.getElementById("pos-display").textContent =
          Math.round(centerWorldX) + ", " + Math.round(centerWorldY);
      }

      // === Initiale Render ===
      render();
    </script>
  </body>
</html>
